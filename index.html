<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Мой сайт</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: #1f1f1f;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Привет 👋</h1>
  <p>Это мой первый Go сайт</p>

  <button onclick="alert('Сайт работает!')">
    Нажми меня
  </button>
</div>

</body>
</html>
